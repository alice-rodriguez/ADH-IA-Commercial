seuils:
  # Score minimum à la passe 1 (mots-clés) pour passer à l'IA
  score_pre_filtre_minimum: 2
  # Score minimum donné par l'IA (sur 100) pour inclure l'offre dans le digest
  score_ia_minimum: 60
  # Nombre maximum de profils CV suggérés par offre
  top_matchings_par_offre: 3
  # Nombre de jours sans ré-envoyer la même offre
  fenetre_deduplication_jours: 7

email:
  # Adresses des destinataires du digest quotidien
  destinataires:
    - "alice.rodriguez@adhpmconsulting.com"
  # Heure d'envoi (format HH:MM, heure de Paris)
  heure_envoi: "07:00"
  # Jours d'envoi
  jours:
    - "lundi"
    - "mardi"
    - "mercredi"
    - "jeudi"
    - "vendredi"
  # Envoyer même si aucune nouvelle offre ce jour-là ?
  envoyer_si_vide: true
  # Objet de l'email
  objet: "ADH — Digest Opportunités du {date}"

