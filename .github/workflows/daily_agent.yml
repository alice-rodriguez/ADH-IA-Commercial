name: Agent ADH — Digest Quotidien

on:
  schedule:
    # Tous les jours à 06h00 UTC = 07h00 heure de Paris (heure d'été)
    # En heure d'hiver, ajustez à 06h00 UTC = 07h00 (UTC+1)
    - cron: "0 6 * * 1-5"   # Lundi à vendredi uniquement

  # Permet de lancer manuellement depuis l'interface GitHub (pour les tests)
  workflow_dispatch:

jobs:
  digest:
    name: Collecter et envoyer le digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'agent ADH
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_EXPEDITEUR:    ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE:  ${{ secrets.EMAIL_MOT_DE_PASSE }}
          EMAIL_SERVEUR_SMTP:  smtp.office365.com
          EMAIL_PORT_SMTP:     "587"
          DB_PATH:             data/offers.db
          CVS_PATH:            cvs/
        run: python -m src.main

      - name: Sauvegarder la base de données (entre les exécutions)
        uses: actions/cache@v4
        with:
          path: data/
          key: adh-database-${{ github.run_id }}
          restore-keys: |
            adh-database-
