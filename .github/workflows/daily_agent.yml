name: Agent ADH — Digest Quotidien

on:
  workflow_dispatch:
    inputs:
      mode_test:
        description: 'Mode test (injecte 2 offres fictives)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  schedule:
    # Tous les jours à 06h00 UTC = 07h00 heure de Paris (heure d'été)
    - cron: "0 6 * * 1-5"   # Lundi à vendredi uniquement

jobs:
  digest:
    name: Collecter et envoyer le digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Restaurer la base de données (déduplication entre les jours)
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: adh-database-latest
          restore-keys: |
            adh-database-

      - name: Lancer l'agent ADH
        env:
          # IA
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          # Email expéditeur
          EMAIL_EXPEDITEUR:     ${{ secrets.EMAIL_EXPEDITEUR }}
          # Azure AD — Microsoft Graph API
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          # Chemins
          DB_PATH:              data/offers.db
          CVS_PATH:             cvs/
          # Mode test (manuel uniquement)
          MODE_TEST:            ${{ inputs.mode_test || 'false' }}
        run: python -m src.main

      - name: Sauvegarder la base de données
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: adh-database-latest
